<body>

<div class="container" style="margin: 12% 2% 2% 2%;">

    <!-- The contact form  -->
<form action="https://formspree.io/me@dpedraza.com" method="POST">
  <div class="row">
    <div class="six columns">
      <label for="exampleEmailInput">Your email</label>
      <input class="u-full-width" type="email" name="_replyto" placeholder="test@mailbox.com" id="exampleEmailInput">
    </div>
    <div class="six columns">
      <label for="exampleRecipientInput">Reason for contacting</label>
      <select class="u-full-width" name="reason" id="exampleRecipientInput">
        <option value="Question">Questions</option>
        <option value="Admiration">Admiration</option>
        <option value="Number">Can I get your number?</option>
      </select>
    </div>
  </div>
  <label for="exampleMessage">Message</label>
  <textarea class="u-full-width" name="message" placeholder="Hello…" id="exampleMessage"></textarea>
  <label class="example-send-yourself-copy">
    <input type="checkbox">
    <span class="label-body">Send a copy to yourself</span>
  </label>
  <input class="button-primary" type="submit" value="Submit">
</form>

<!-- Always wrap checkbox and radio inputs in a label and use a <span class="label-body"> inside of it -->

<!-- Note: The class .u-full-width is just a utility class shorthand for width: 100% -->

<div class="row">
  <!-- <div class ="nine columns icons" ></div> -->
  <div class="four columns">
    <a class="icons" href="mailto:me@dpedraza.com"><i class="fas fa-envelope fa-lg"></i><i class="label">Mail</i></a>
    <a class="icons" href="https://twitter.com/sumdp"><i class="fab fa-twitter fa-lg"></i><i class="label">Twitter"</a>
